name: Build + Test
permissions:
  contents: read

on:
  push:
    branches: ["main"]
    paths-ignore:
      - .gitignore
      - LICENSE
      - README.md
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Restore dependencies
        run: dotnet restore DotNetStarterProjectTemplate.slnx

      - name: Build
        run: dotnet build DotNetStarterProjectTemplate.slnx --no-restore

      - name: Test
        run: |
          SSL_CERT_DIR=$HOME/.aspnet/dev-certs/trust dotnet dev-certs https --trust
          dotnet test --solution DotNetStarterProjectTemplate.slnx --no-build --verbosity normal
